name: Build and Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud API15
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = 'https://github.com/goatcorp/dalamud-distrib/raw/main/api15/latest.zip'
          Invoke-WebRequest -Uri $url -OutFile 'dalamud.zip'
          Expand-Archive -Path 'dalamud.zip' -DestinationPath 'dalamud' -Force

      - name: Build
        shell: pwsh
        env:
          DALAMUD_HOME: ${{ github.workspace }}\dalamud
        run: |
          dotnet build PluginDockStandalone.csproj -c Release -v minimal

      - name: Collect release assets
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE 'release'
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          Copy-Item 'bin\Release\PluginDockStandalone\latest.zip' $releaseDir
          Copy-Item 'bin\Release\PluginDockStandalone\PluginDockStandalone.json' $releaseDir
          Copy-Item 'images\icon.png' $releaseDir

          $readme = @(
            '# PluginDockStandalone'
            ''
            'Automatic release assets:'
            '- latest.zip: plugin package'
            '- PluginDockStandalone.json: Dalamud manifest'
            '- icon.png: plugin icon'
            ''
            'This release is refreshed automatically when main is updated.'
          )

          Set-Content (Join-Path $releaseDir 'README.md') -Value $readme -Encoding utf8

      - name: Publish release asset
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          artifactErrorsFailBuild: true
          artifacts: release/latest.zip,release/PluginDockStandalone.json,release/icon.png,release/README.md
